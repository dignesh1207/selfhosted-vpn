<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>CloudVPN</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:300px;background:#0a0a0f;font-family:'Segoe UI',system-ui,sans-serif;color:#e8e8f0;overflow:hidden}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid #111}
    .brand{display:flex;align-items:center;gap:8px}
    .brand-flag{font-size:18px}
    .brand-name{font-size:14px;font-weight:700;color:#fff}
    .brand-sub{font-size:10px;color:#444;letter-spacing:.5px;margin-top:1px}
    .gear-btn{background:none;border:none;color:#333;cursor:pointer;font-size:16px;padding:4px;border-radius:5px;transition:color .2s}
    .gear-btn:hover{color:#666}
    .main{padding:20px 16px 16px;display:flex;flex-direction:column;align-items:center;gap:16px}
    .power-ring{width:110px;height:110px;border-radius:50%;border:2px solid #1a1a2e;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .4s}
    .power-ring.connected{border-color:#00e676;box-shadow:0 0 30px rgba(0,230,118,.25)}
    .power-ring.connecting{border-color:#ff9800;animation:pulse 1.2s ease infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,152,0,.2)}50%{box-shadow:0 0 40px rgba(255,152,0,.5)}}
    .power-inner{width:82px;height:82px;border-radius:50%;background:#0f0f1a;border:1px solid #1e1e30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:background .3s}
    .power-ring.connected .power-inner{background:#061810;border-color:#0a2a18}
    .power-icon{font-size:28px}
    .power-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#555;transition:color .3s}
    .power-ring.connected .power-label{color:#00e676}
    .power-ring.connecting .power-label{color:#ff9800}
    .status-text{font-size:12px;color:#444;text-align:center;min-height:16px}
    .status-text.on{color:#00e676}
    .status-text.err{color:#ff5252}
    .status-text.connecting{color:#ff9800}
    .stats-row{display:flex;width:100%;gap:8px}
    .stat{flex:1;background:#111;border:1px solid #1a1a2a;border-radius:8px;padding:8px 10px}
    .stat-label{font-size:9px;color:#333;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
    .stat-val{font-size:12px;font-weight:600;color:#666}
    .stat-val.active{color:#ccc}
    .divider{width:100%;height:1px;background:#111}
    .settings-panel{width:100%;background:#0d0d18;border-top:1px solid #111;padding:14px 16px;display:none;flex-direction:column;gap:10px}
    .settings-panel.open{display:flex}
    .settings-title{font-size:10px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:1px}
    .field{display:flex;flex-direction:column;gap:4px}
    .field label{font-size:10px;color:#333}
    .field input{background:#080810;border:1px solid #1a1a2a;border-radius:6px;color:#888;font-size:11px;padding:7px 10px;outline:none;font-family:'Courier New',monospace;transition:border-color .2s}
    .field input:focus{border-color:#2a2a4a;color:#ccc}
    .save-btn{background:#111;border:1px solid #1e1e30;border-radius:6px;color:#555;font-size:11px;font-weight:600;padding:8px;cursor:pointer;transition:all .2s}
    .save-btn:hover{background:#161625;color:#aaa}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <span class="brand-flag"></span>
      <div>
        <div class="brand-name">CloudVPN</div>
        <div class="brand-sub">AWS · WIREGUARD</div>
      </div>
    </div>
    <button class="gear-btn" id="gearBtn">⚙️</button>
  </div>

  <div class="main">
    <div class="power-ring" id="powerRing">
      <div class="power-inner">
        <span class="power-icon">⏻</span>
        <span class="power-label" id="powerLabel">Off</span>
      </div>
    </div>
    <div class="status-text" id="statusText">Tap to connect</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Location</div><div class="stat-val" id="statLoc">—</div></div>
      <div class="stat"><div class="stat-label">Server IP</div><div class="stat-val" id="statIp">—</div></div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Proxy</div><div class="stat-val" id="statProxy">Inactive</div></div>
      <div class="stat"><div class="stat-label">WireGuard</div><div class="stat-val" id="statWg">—</div></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">Server Configuration</div>
    <div class="field"><label>Server IP</label><input type="text" id="inpIp" placeholder="Your EC2 IP"/></div>
    <div class="field"><label>API Port</label><input type="text" id="inpPort" placeholder="3000"/></div>
    <div class="field"><label>API Secret Key</label><input type="password" id="inpKey" placeholder="Your API key"/></div>
    <div class="field"><label>Proxy Port</label><input type="text" id="inpProxy" placeholder="8888"/></div>
    <button class="save-btn" id="saveBtn">Save & Close</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
